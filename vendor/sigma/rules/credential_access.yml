title: Credential Access via LSASS
id: sandbox-009
status: stable
level: critical
description: Detects access to LSASS process for credential dumping
author: Sandbox Platform
date: 2024/01/15
modified: 2024/01/15
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        target_process|contains:
            - lsass.exe
        api_calls|contains:
            - OpenProcess
            - ReadProcessMemory
    condition: selection
falsepositives:
    - Security tools scanning LSASS
    - Windows diagnostic tools
