version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sandbox_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sandbox_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ../src/config/grafana_dashboards.json:/etc/grafana/provisioning/dashboards/sandbox.json
      - ./grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    profiles:
      - observability

volumes:
  prometheus-data:
  grafana-data:
